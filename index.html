<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Índice Fotografias</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 24px; }
    h1 { margin: 0 0 12px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
      padding: 0;
      list-style: none;
      margin: 16px 0 0;
    }
    .card {
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 12px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform .08s ease, box-shadow .08s ease;
    }
    .card:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(0,0,0,.08);
    }
    .thumb {
      width: 100%;
      height: 56px;
      object-fit: contain;
      background: #fafafa;
      border-radius: 10px;
      border: 1px solid #f0f0f0;
    }
    .name {
      margin-top: 10px;
      font-weight: 700;
      font-size: 14px;
      text-transform: lowercase;
    }
    .hint { color: #666; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Índice de fotos</h1>
  <div class="hint">Haz click en un nombre para abrir su foto.</div>

  <ul id="grid" class="grid"></ul>

  <script>
    // 👇 Pon aquí tus slugs EXACTOS (igual que el nombre del archivo sin .png)
    // Ejemplo: assets/fabiola.png  ->  "fabiola"
    const slugs = [
      "judith","pablo","omar","zuleyca","alejandra","dulce","nayeli","edith","eduardo","andrea","liliana",
      "stephanie","griselda","javier"
    ];

    const grid = document.getElementById("grid");

    slugs.forEach(slug => {
      const href = `./assets/${slug}.png`;

      const li = document.createElement("li");

      const a = document.createElement("a");
      a.className = "card";
      a.href = href;
      a.target = "_blank";
      a.rel = "noopener";

      const img = document.createElement("img");
      img.className = "thumb";
      img.src = href;
      img.alt = `firma ${slug}`;
      img.loading = "lazy";
      img.onerror = () => { img.style.display = "none"; }; // si falta el archivo, no rompe la UI

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = slug;

      a.appendChild(img);
      a.appendChild(name);
      li.appendChild(a);
      grid.appendChild(li);
    });
  </script>
</body>
</html>
